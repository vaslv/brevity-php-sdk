# Keeps the SHA-pinned actions and the dev toolchain lock current.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    # The lock only pins the dev toolchain; never touch the constraints
    # consumers resolve against (composer.json stays at the PHP 7.1 floor).
    versioning-strategy: lockfile-only
